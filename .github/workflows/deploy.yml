name: Deploy Battlegrounds Workspace to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # --- FIXED: Forces GitHub to utilize Node 24 securely across actions ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout Workspace Code Blueprint
        uses: actions/checkout@v4

      - name: Setup Secure Page Modules
        uses: actions/configure-pages@v5

      - name: Bundle Web Assets Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Execute Live Deployment
        id: deployment
        uses: actions/deploy-pages@v4
        
